    <body>

        <header>
            <nav>
                <a href="index.html"> Home </a>
                <a href="gallery.html"> Gallery </a>
                <a href="about.html"> About </a>
                <a href="contact.html"> Contact </a>
            </nav>
        </header>

        <main class="gallery-collection-page">
            <h1> Engagement Shoots </h1>

            <div class="full-image-gallery">
                <img src ="asset/Engament 2.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/Ramina 1.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/ramina 2.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/ramina 4.jpg" onclick="openLightbox (this.src)" />

            </div>
        </main>

      <div id="lightbox" class="lightbox">
            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
           <img id="lightbox-img" class="lightbox-content" alt="">
        <script>
            function openLightbox(src) {
                document.getElementById("lightbox").style.display= "flex";
                document.getElementById("lightbox-img").src = src;
            }

            function closeLightbox(event) {
                document.getElementById("lightbox") .style.display = "none";
}
        </script>
          
            

    </body>
