        <main class="gallery-collection-page">
            <h1> Family </h1>

            <div class="full-image-gallery">
                <img src="asset/Ahwell1.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/Ahwell2.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/Ahwell3.jpg" onclick="openLightbox (this.src)" />
                <img src="asset/Ahwell4.jpg" onclick="openLightbox (this.src)" />

         <div id="lightbox" class="lightbox">
            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
           <img id="lightbox-img" class="lightbox-content" alt="">
        <script>
            function openLightbox(src) {
                document.getElementById("lightbox").style.display= "flex";
                document.getElementById("lightbox-img").src = src;
            }

            function closeLightbox(event) {
                document.getElementById("lightbox") .style.display = "none";
}
        </script>
